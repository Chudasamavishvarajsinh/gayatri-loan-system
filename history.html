<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History | Gayatri Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --dark: #0f172a;
            --light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR (Matches user.html) */
        .sidebar {
            width: 280px;
            background: var(--dark);
            color: var(--white);
            padding: 30px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar h2 { font-size: 22px; color: var(--primary); margin: 0; }
        .sidebar p.brand-sub { font-size: 13px; color: #94a3b8; margin-bottom: 40px; }

        .nav-menu { flex: 1; }
        .nav-item {
            display: block;
            padding: 12px 15px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 10px;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: var(--white); }

        /* MAIN CONTENT */
        .main-container {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
        }

        .header-bar { margin-bottom: 40px; }
        .header-bar h1 { font-size: 28px; margin: 0; color: var(--dark); }
        .header-bar p { color: var(--secondary); margin: 5px 0 0; }

        /* TABLE CARD */
        .card {
            background: var(--white);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-responsive { width: 100%; overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }

        th { 
            background: #f1f5f9; 
            text-align: left; 
            font-size: 12px; 
            color: var(--secondary); 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            padding: 18px 20px; 
            border-bottom: 1px solid var(--border); 
        }

        td { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border); 
            font-size: 14px; 
            font-weight: 500;
            color: var(--dark);
        }

        tbody tr:hover { background-color: #f8fafc; }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 15px; }
            .sidebar h2, .sidebar p.brand-sub, .nav-item span { display: none; }
            .main-container { margin-left: 80px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Gayatri</h2>
        <p class="brand-sub">Electronic Services</p>
        <nav class="nav-menu">
            <a href="user.html" class="nav-item"><span>My Dashboard</span></a>
            <a href="history.html" class="nav-item active"><span>Payment History</span></a>
            <a href="status.html" class="nav-item"><span>Track Status</span></a>
        </nav>
        <div class="nav-item" style="color: #f87171; cursor: pointer; margin-top: auto;" id="logoutBtn">
            <span>Logout</span>
        </div>
    </aside>

    <main class="main-container">
        <div class="header-bar">
            <h1>Payment History</h1>
            <p>A full archive of your loan applications and transaction records.</p>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Amount (₹)</th>
                            <th>Status</th>
                            <th>Meeting Date</th>
                            <th>Date Created</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: var(--secondary);">
                                Loading history records...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="js/history.js"></script>
    <script type="module" src="js/user-dashboard.js"></script>

</body>
</html>
