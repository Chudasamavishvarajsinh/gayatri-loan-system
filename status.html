<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status | Gayatri Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --secondary: #64748b; --dark: #0f172a; --light: #f8fafc;
            --white: #ffffff; --border: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--light); color: var(--dark); display: flex; min-height: 100vh; }

        /* SIDEBAR (Matches dashboard and history) */
        .sidebar {
            width: 280px; background: var(--dark); color: var(--white); padding: 30px;
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
        }
        .sidebar h2 { font-size: 22px; color: var(--primary); margin: 0; }
        .sidebar p.brand-sub { font-size: 13px; color: #94a3b8; margin-bottom: 40px; }
        .nav-menu { flex: 1; }
        .nav-item {
            display: block; padding: 12px 15px; color: #cbd5e1; text-decoration: none;
            border-radius: 10px; margin-bottom: 10px; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: var(--white); }

        /* MAIN CONTENT */
        .main-container { margin-left: 280px; flex: 1; padding: 40px; }
        .header-bar { margin-bottom: 40px; }
        .header-bar h1 { font-size: 28px; margin: 0; }

        .card {
            background: var(--white); padding: 30px; border-radius: 20px;
            border: 1px solid var(--border); box-shadow: var(--shadow); text-align: center;
        }

        .status-icon {
            width: 80px; height: 80px; background: #dcfce7; color: #166534;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 20px;
        }

        #currentStatusText { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        #statusNote { color: var(--secondary); max-width: 400px; margin: 0 auto; line-height: 1.6; }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 15px; }
            .sidebar h2, .sidebar p.brand-sub, .nav-item span { display: none; }
            .main-container { margin-left: 80px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Gayatri</h2>
        <p class="brand-sub">Electronic Services</p>
        <nav class="nav-menu">
            <a href="user.html" class="nav-item"><span>My Dashboard</span></a>
            <a href="history.html" class="nav-item"><span>Payment History</span></a>
            <a href="status.html" class="nav-item active"><span>Track Status</span></a>
        </nav>
        <div class="nav-item" style="color: #f87171; cursor: pointer; margin-top: auto;" id="logoutBtn">
            <span>Logout</span>
        </div>
    </aside>

    <main class="main-container">
        <div class="header-bar">
            <h1>Account Standing</h1>
            <p style="color: var(--secondary); margin-top: 5px;">A quick overview of your current verification and loan status.</p>
        </div>

        <div class="card">
            <div class="status-icon" id="statusIndicator">✓</div>
            <h2 id="currentStatusText">Checking Status...</h2>
            <p id="statusNote">Please wait while we sync your records with the official database.</p>
            
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">
            
            <p style="font-size: 13px; color: var(--secondary);">
                Last updated: <span id="lastUpdatedTime">--:--</span>
            </p>
        </div>
    </main>

    <script type="module" src="js/status.js"></script>
</body>
</html>
