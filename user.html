<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal | Gayatri Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --dark: #0f172a; --light: #f8fafc; --white: #ffffff;
            --border: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: #f1f5f9; color: var(--dark); padding: 20px; }

        .container { max-width: 800px; margin: 0 auto; }
        
        /* BRANDING HEADER */
        .brand-header {
            background: var(--dark); color: white; padding: 30px; border-radius: 24px 24px 0 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand-header h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .logout-link { color: #f87171; text-decoration: none; font-size: 14px; font-weight: 600; cursor: pointer; }

        /* SUMMARY CARD */
        .main-card {
            background: var(--white); padding: 40px; border-radius: 0 0 24px 24px;
            box-shadow: var(--shadow); margin-bottom: 20px;
        }
        .welcome-msg { margin-bottom: 30px; }
        .welcome-msg h2 { margin: 0; font-size: 28px; }
        .welcome-msg p { color: #64748b; margin: 5px 0 0; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .stat-box { padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-box label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .stat-box div { font-size: 24px; font-weight: 800; margin-top: 8px; }

        .balance-card {
            background: #eff6ff; border: 1px solid #dbeafe; padding: 25px;
            border-radius: 20px; text-align: center; margin-top: 20px;
        }
        .balance-card label { color: var(--primary); font-weight: 700; }
        .balance-card .amount { font-size: 42px; font-weight: 800; color: var(--dark); margin: 10px 0; }

        .footer-address {
            text-align: center; margin-top: 40px; padding: 20px;
            font-size: 13px; color: #64748b; line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="brand-header">
            <div>
                <h1>GAYATRI</h1>
                <span style="font-size: 10px; color: #94a3b8; letter-spacing: 1px;">ELECTRONICS KHATA</span>
            </div>
            <div id="logoutBtn" class="logout-link">Sign Out</div>
        </header>

        <div class="main-card">
            <div class="welcome-msg">
                <h2 id="userName">Welcome!</h2>
                <p>Your current loan account summary is below.</p>
            </div>

            <div class="balance-card">
                <label>Remaining Balance (Outstanding)</label>
                <div class="amount" id="userRemaining">₹0</div>
                <div id="loanStatusBadge" style="font-size: 12px; font-weight: 700; color: #10b981;">ACTIVE ACCOUNT</div>
            </div>

            <div class="stats-row">
                <div class="stat-box">
                    <label>Principal Amount</label>
                    <div id="userPrincipal">₹0</div>
                </div>
                <div class="stat-box" style="background: #f0fdf4;">
                    <label>Total Paid to Date</label>
                    <div id="userPaid" style="color: #15803d;">₹0</div>
                </div>
            </div>
        </div>

        <div class="footer-address">
            <strong>Chudasama Baldevsinh Mansang</strong><br>
            +91 9924232759<br>
            Beside Chamunda Games Store, Opp. Pir Ni Dargah, Street No. 5,<br>
            Khodiyar Colony, Jamnagar, Gujarat 361006
        </div>
    </div>

    <script type="module" src="js/user-dashboard.js"></script>
</body>
</html>
