<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Customers | Gayatri Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --secondary: #64748b; --dark: #0f172a; --light: #f8fafc;
            --white: #ffffff; --border: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--light); color: var(--dark); display: flex; min-height: 100vh; }

        /* SIDEBAR (Consistent with Dashboard) */
        .sidebar {
            width: 280px; background: var(--dark); color: var(--white); padding: 30px;
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
        }
        .sidebar h2 { font-size: 24px; color: var(--primary); margin: 0; font-weight: 800; }
        .sidebar p.owner { font-size: 12px; color: #94a3b8; margin-bottom: 40px; text-transform: uppercase; }
        .nav-link {
            display: block; padding: 12px 15px; color: #cbd5e1; text-decoration: none;
            border-radius: 12px; margin-bottom: 8px; font-weight: 500;
        }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: var(--white); }
        .nav-link.active { background: var(--primary); color: var(--white); }

        /* MAIN CONTENT */
        .main-content { margin-left: 280px; flex: 1; padding: 40px; }
        .header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        /* TABLE STYLING */
        .card {
            background: var(--white); border-radius: 24px; border: 1px solid var(--border);
            box-shadow: var(--shadow); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 15px 20px; font-size: 12px; text-transform: uppercase; color: var(--secondary); font-weight: 700; }
        td { padding: 18px 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        
        .user-name { font-weight: 700; color: var(--dark); display: block; }
        .user-email { font-size: 12px; color: var(--secondary); }
        
        .btn-view {
            padding: 8px 16px; background: var(--light); border: 1px solid var(--border);
            border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-view:hover { background: var(--primary); color: white; border-color: var(--primary); }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 15px; }
            .sidebar h2, .sidebar p, .nav-link span { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>GAYATRI</h2>
        <p class="owner">Admin: Baldevsinh</p>
        <nav class="nav-menu">
            <a href="admin_dashboard.html" class="nav-link"><span>Dashboard Summary</span></a>
            <a href="admin_users.html" class="nav-link active"><span>Manage Customers</span></a>
            <a href="admin_loans.html" class="nav-link"><span>Loan Management</span></a>
            <a href="admin_ledger.html" class="nav-link"><span>Global Ledger</span></a>
        </nav>
        <div style="margin-top: auto; font-size: 11px; color: #64748b;">
            Gayatri Electronics<br>Jamnagar, Gujarat
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div>
                <h1>Customer Directory</h1>
                <p style="color: var(--secondary); margin-top: 5px;">View and manage all registered users in the system.</p>
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Customer Details</th>
                        <th>Phone Number</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px; color: var(--secondary);">
                            Loading customers...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module" src="js/admin-users.js"></script>
</body>
</html>
