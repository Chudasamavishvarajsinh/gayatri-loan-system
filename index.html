<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gayatri Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --dark: #0f172a; --light: #f8fafc; --white: #ffffff;
            --border: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            margin: 0; background-color: var(--light); color: var(--dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
        }
        .login-card {
            background: var(--white); padding: 40px; border-radius: 24px;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            width: 100%; max-width: 420px; text-align: center;
        }
        .logo-area h1 { margin: 0; color: var(--primary); font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        .logo-area p { color: #64748b; margin: 5px 0 30px; font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--dark); }
        .form-group input {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 12px; font-size: 15px; transition: 0.2s; background: #fcfdfe;
        }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .login-btn {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .login-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
        
        .error-box { color: #e11d48; background: #fff1f2; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; border: 1px solid #fee2e2; }
        
        .footer-info { margin-top: 30px; font-size: 12px; color: #94a3b8; line-height: 1.6; text-align: center; max-width: 400px; }
        .contact-highlight { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <h1>GAYATRI</h1>
            <p>Electronics & Loan Services</p>
        </div>

        <div id="errorBox" class="error-box"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your registered email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Secure Sign In</button>
        </form>
    </div>

    <div class="footer-info">
        <strong>Proprietor: Chudasama Baldevsinh Mansang</strong><br>
        <span class="contact-highlight">+91 9924232759</span><br>
        Beside Chamunda Games Store, Opp. Pir Ni Dargah, Street No. 5,<br>
        Khodiyar Colony, Jamnagar, Gujarat 361006
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
