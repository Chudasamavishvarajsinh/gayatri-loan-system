<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Ledger | Gayatri Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --success: #10b981; --dark: #0f172a; --light: #f8fafc;
            --white: #ffffff; --border: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--light); color: var(--dark); display: flex; min-height: 100vh; }

        /* SIDEBAR (Consistent) */
        .sidebar { width: 280px; background: var(--dark); color: var(--white); padding: 30px; position: fixed; height: 100vh; }
        .sidebar h2 { color: var(--primary); margin: 0; }
        .nav-link { display: block; padding: 12px; color: #cbd5e1; text-decoration: none; border-radius: 10px; margin-top: 10px; }
        .nav-link:hover { background: rgba(255,255,255,0.1); }

        /* MAIN CONTENT */
        .main-content { margin-left: 280px; flex: 1; padding: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }

        .card { background: var(--white); padding: 25px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 30px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }

        /* SUMMARY STYLES */
        .summary-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat { padding: 15px; background: #f1f5f9; border-radius: 12px; }
        .stat label { font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: 700; }
        .stat div { font-size: 18px; font-weight: 700; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 12px; color: #64748b; padding: 12px; border-bottom: 2px solid var(--light); }
        td { padding: 12px; font-size: 14px; border-bottom: 1px solid var(--light); }

        /* FORM */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }
        .btn-pay { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .status-active { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>GAYATRI</h2>
        <p style="font-size: 12px; color: #94a3b8;">Admin: Baldevsinh</p>
        <nav>
            <a href="admin_dashboard.html" class="nav-link">Dashboard</a>
            <a href="admin_users.html" class="nav-link">Manage Customers</a>
            <a href="admin_loans.html" class="nav-link">Loans</a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 id="customerName">Loading...</h1>
            <p id="customerContact" style="color: #64748b;"></p>
        </header>

        <div class="grid">
            <div class="left-col">
                <div class="card">
                    <div class="card-title">
                        Loan Summary
                        <span id="loanStatus" class="status-badge status-active">ACTIVE</span>
                    </div>
                    <div class="summary-box">
                        <div class="stat"><label>Principal</label><div id="sumPrincipal">₹0</div></div>
                        <div class="stat"><label>Total with Interest</label><div id="sumTotal">₹0</div></div>
                        <div class="stat" style="background: #fff1f2;"><label>Remaining</label><div id="sumRemaining" style="color: #e11d48;">₹0</div></div>
                        <div class="stat" style="background: #f0fdf4;"><label>Total Paid</label><div id="sumPaid" style="color: #15803d;">₹0</div></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Payment Ledger</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Amount Paid</th>
                            </tr>
                        </thead>
                        <tbody id="ledgerTableBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="right-col">
                <div class="card">
                    <div class="card-title">Add Payment</div>
                    <form id="paymentForm">
                        <div class="form-group">
                            <label>Amount Received (₹)</label>
                            <input type="number" id="payAmount" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Payment Note</label>
                            <input type="text" id="payNote" placeholder="e.g. Monthly EMI, Cash">
                        </div>
                        <button type="submit" class="btn-pay" id="payBtn">Submit Payment</button>
                    </form>
                </div>

                <div style="font-size: 12px; color: #94a3b8; text-align: center;">
                    <strong>Gayatri Electronics</strong><br>
                    Beside Chamunda Games Store, Jamnagar<br>
                    Contact: +91 9924232759
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/admin-user-details.js"></script>
</body>
</html>
